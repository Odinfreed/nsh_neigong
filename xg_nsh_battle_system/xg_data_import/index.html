<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帮会数据一键导入 - 逆水寒帮战系统 v4.0.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        :root {
            --ink-black: #0d0d0d;
            --ink-dark: #1a1a1a;
            --ink-gray: #2a2a2a;
            --jade: #00d4aa;
            --jade-dim: #00d4aa40;
            --gold: #c9a227;
            --gold-dim: #c9a22730;
            --cyan: #00b4d8;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--ink-black);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            color: #e0e0e0;
        }
        
        .ink-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 180, 216, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 212, 170, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 40%, rgba(201, 162, 39, 0.04) 0%, transparent 40%);
        }
        
        .tech-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 212, 170, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 170, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .corner-decoration {
            position: absolute;
            width: 40px; height: 40px;
            border: 1px solid var(--jade-dim);
        }
        .corner-decoration.top-left { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .corner-decoration.top-right { top: -1px; right: -1px; border-left: none; border-bottom: none; }
        .corner-decoration.bottom-left { bottom: -1px; left: -1px; border-right: none; border-top: none; }
        .corner-decoration.bottom-right { bottom: -1px; right: -1px; border-left: none; border-top: none; }
        
        .main-title {
            font-family: 'Noto Serif SC', serif;
            font-weight: 700;
            letter-spacing: 0.3em;
            background: linear-gradient(180deg, #f5f5f5 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 212, 170, 0.3);
        }
        
        .subtitle {
            font-family: 'Noto Serif SC', serif;
            font-weight: 400;
            letter-spacing: 0.2em;
            color: #888;
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--jade);
            opacity: 0.6;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--jade-dim), transparent);
        }
        
        .main-card {
            background: linear-gradient(145deg, rgba(26, 26, 26, 0.9) 0%, rgba(13, 13, 13, 0.95) 100%);
            border: 1px solid var(--ink-gray);
            position: relative;
            transition: all 0.4s ease;
            overflow: hidden;
        }
        
        .input-section {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--ink-gray);
            transition: all 0.3s ease;
        }
        .input-section:focus-within { border-color: var(--jade-dim); }
        
        .upload-zone {
            border: 2px dashed var(--ink-gray);
            background: rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--jade);
            background: rgba(0, 212, 170, 0.05);
        }
        
        .action-btn {
            position: relative;
            background: transparent;
            border: 1px solid var(--ink-gray);
            color: #ccc;
            transition: all 0.3s ease;
            overflow: hidden;
            font-family: 'Noto Sans SC', sans-serif;
            letter-spacing: 0.1em;
        }
        .action-btn::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 0;
            background: linear-gradient(180deg, transparent, rgba(0, 212, 170, 0.1));
            transition: height 0.3s ease;
        }
        .action-btn:hover {
            border-color: var(--jade);
            color: var(--jade);
        }
        .action-btn:hover::before { height: 100%; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .primary-btn {
            position: relative;
            background: transparent;
            border: 1px solid var(--jade-dim);
            color: var(--jade);
            transition: all 0.3s ease;
            overflow: hidden;
            font-family: 'Noto Sans SC', sans-serif;
            letter-spacing: 0.15em;
        }
        .primary-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 212, 170, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .primary-btn:hover {
            border-color: var(--jade);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.2);
        }
        .primary-btn:hover::before { opacity: 1; }
        
        .danger-btn {
            border-color: var(--ink-gray);
            color: #888;
        }
        .danger-btn:hover {
            border-color: #8b2635;
            color: #c9404b;
        }
        
        .custom-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--ink-gray);
            color: #ccc;
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            outline: none;
            border-color: var(--jade-dim);
            box-shadow: 0 0 10px rgba(0, 212, 170, 0.1);
        }
        
        /* 日期选择器日历图标改为白色 */
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        
        .status-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--ink-gray);
        }
        
        .jump-btn {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 1rem;
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid var(--jade-dim);
            color: var(--jade);
            border-radius: 4px;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }
        .jump-btn:hover {
            background: rgba(0, 212, 170, 0.2);
            border-color: var(--jade);
        }
        
        .footer-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--ink-gray), transparent);
        }
        
        .scan-line {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--jade-dim), transparent);
            opacity: 0.3;
            animation: scan 8s linear infinite;
            pointer-events: none;
            z-index: 100;
        }
        @keyframes scan {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
        
        .hidden-file-input { display: none; }
        
        /* 多场数据列表样式 */
        .battle-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--ink-gray);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .battle-item:hover {
            border-color: var(--jade-dim);
            background: rgba(0, 212, 170, 0.05);
        }
        .battle-item.selected {
            border-color: var(--jade);
            background: rgba(0, 212, 170, 0.15);
        }
        .battle-item.active {
            border-color: var(--jade);
            background: rgba(0, 212, 170, 0.1);
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--ink-dark); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--jade-dim); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--jade); }
        
        /* 列表容器滚动条 */
        #multiBattleList::-webkit-scrollbar {
            width: 4px;
        }
        #multiBattleList::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 2px;
        }
        #multiBattleList::-webkit-scrollbar-thumb {
            background: var(--jade-dim);
            border-radius: 2px;
        }
        #multiBattleList::-webkit-scrollbar-thumb:hover {
            background: var(--jade);
        }
        
        /* 选择框样式 */
        .battle-checkbox {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 1px solid var(--ink-gray);
            border-radius: 3px;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }
        .battle-checkbox:checked {
            background: var(--jade);
            border-color: var(--jade);
        }
        .battle-checkbox:checked::after {
            content: '\2713';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #000;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body class="p-6 md:p-8">
    <div class="scan-line"></div>
    <div class="ink-bg"></div>
    <div class="tech-grid"></div>
    
    <div class="max-w-6xl mx-auto relative">
        <!-- 头部 -->
        <header class="text-center mb-8">
            <div class="flex justify-center mb-4 opacity-40">
                <svg width="120" height="24" viewBox="0 0 120 24" fill="none">
                    <path d="M0 12h40M80 12h40" stroke="#00d4aa" stroke-width="0.5" opacity="0.5"/>
                    <circle cx="60" cy="12" r="3" stroke="#00d4aa" stroke-width="0.5" fill="none"/>
                    <path d="M50 12l5-3v6l-5-3zm20 0l-5-3v6l5-3z" fill="#00d4aa" opacity="0.5"/>
                </svg>
            </div>
            <h1 class="main-title text-2xl md:text-3xl mb-2">帮会数据一键导入</h1>
            <div class="divider text-sm mb-2 max-w-md mx-auto"><i class="fas fa-yin-yang"></i></div>
            <p class="subtitle text-sm">支持导入多场帮战数据，自动整理供后续分析</p>
            <p class="text-xs text-jade mt-2"><i class="fas fa-star mr-1"></i>v4.0.0 多场数据管理（无限制存储，最多选择10场分析）</p>
        </header>

        <!-- v4.0.0: 多场数据导入管理 -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-6 items-stretch">
            <!-- 左侧：多场数据列表 -->
            <div class="lg:col-span-1 flex">
                <div class="main-card rounded-sm p-4 h-full flex flex-col" style="min-height: 420px;">
                    <div class="corner-decoration top-left"></div>
                    <div class="corner-decoration top-right"></div>
                    <div class="corner-decoration bottom-left"></div>
                    <div class="corner-decoration bottom-right"></div>
                    
                    <div class="relative flex flex-col flex-1">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-base font-medium text-gray-300 flex items-center">
                                <i class="fas fa-layer-group mr-2 text-jade"></i>
                                多场数据列表
                            </h3>
                            <span id="battleCountBadge" class="text-xs bg-jade/20 text-jade px-2 py-0.5 rounded">0 场</span>
                        </div>
                        
                        <div id="multiBattleList" class="space-y-2 overflow-y-auto">
                            <div class="text-center text-gray-500 py-6 text-sm">
                                <i class="fas fa-inbox text-xl mb-2 block"></i>
                                暂无导入数据
                            </div>
                        </div>
                        
                        <div class="mt-3 pt-3 border-t border-gray-800 space-y-2">
                            <div id="selectionControls" class="flex items-center justify-between text-xs text-gray-500 mb-2 hidden">
                                <span>勾选 <span id="selectedCount" class="text-jade">0</span> 场导入</span>
                                <div class="flex items-center gap-2">
                                    <label class="flex items-center gap-1 cursor-pointer" title="勾选后自动选择最近的10场数据">
                                        <input type="checkbox" id="autoSelectCheckbox" checked 
                                               class="w-3 h-3 accent-jade cursor-pointer"
                                               onchange="toggleAutoSelect(this.checked)">
                                        <span class="text-jade">自动选近10场</span>
                                    </label>
                                    <button onclick="showAutoSelectHelp()" class="text-gray-500 hover:text-jade" title="查看说明">
                                        <i class="fas fa-question-circle"></i>
                                    </button>
                                </div>
                            </div>
                            <div id="autoSelectHint" class="text-xs text-gray-500 mb-2">
                                <i class="fas fa-info-circle mr-1"></i>点击列表选择要导入的场次
                            </div>
                            <button onclick="loadSelectedToAnalysis()" id="loadToAnalysisBtn" class="primary-btn w-full px-3 py-2 text-sm rounded-sm" disabled>
                                <i class="fas fa-file-import mr-2"></i>导入选中到分析系统
                            </button>
                            <button onclick="clearAllBattleData()" class="action-btn danger-btn w-full px-3 py-2 text-sm rounded-sm">
                                <i class="fas fa-trash-alt mr-2"></i>清空所有场次
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：导入区域 -->
            <div class="lg:col-span-3 flex">
                <div class="main-card rounded-sm p-6 h-full flex flex-col w-full" style="min-height: 420px;">
                    <div class="corner-decoration top-left"></div>
                    <div class="corner-decoration top-right"></div>
                    <div class="corner-decoration bottom-left"></div>
                    <div class="corner-decoration bottom-right"></div>
                    
                    <div class="relative h-full flex flex-col">
                        <div class="text-center mb-4">
                            <div class="inline-flex items-center justify-center w-12 h-12 border border-gray-700 rounded-sm mb-2">
                                <i class="fas fa-file-csv text-xl text-gray-500"></i>
                            </div>
                            <h2 class="text-base font-medium text-gray-300 mb-1">导入本场帮战数据</h2>
                            <p class="text-gray-500 text-xs">选择CSV文件自动识别帮会名称</p>
                        </div>

                        <!-- 文件选择区域（移到上方） -->
                        <div class="upload-zone rounded-sm p-6 mb-4 text-center" id="uploadZone">
                            <input type="file" id="csvFileInput" accept=".csv" class="hidden-file-input">
                            <i class="fas fa-cloud-upload-alt text-3xl text-gray-600 mb-2"></i>
                            <p class="text-gray-400 mb-1 text-sm">点击或拖拽CSV文件到此处</p>
                            <p class="text-gray-600 text-xs">支持标准帮战CSV格式，自动识别帮会名称</p>
                        </div>

                        <!-- 状态指示器 -->
                        <div id="statusIndicator" class="hidden mb-4">
                            <div class="status-box rounded-sm px-3 py-2 text-center">
                                <i class="fas fa-spinner fa-spin text-jade mr-2"></i>
                                <span id="statusText" class="text-gray-400 text-sm">正在处理文件...</span>
                            </div>
                        </div>

                        <!-- 解析结果显示（动态显示） -->
                        <div id="parseResult" class="hidden mb-4">
                            <div class="input-section rounded-sm p-3">
                                <h3 class="text-xs font-medium text-jade mb-2 flex items-center">
                                    <i class="fas fa-check-circle mr-2"></i>文件解析成功
                                </h3>
                                <div class="grid grid-cols-2 gap-3 mb-3">
                                    <div class="bg-black/30 rounded p-2">
                                        <span class="text-xs text-gray-500 block">识别到的帮会</span>
                                        <span id="detectedGuild1" class="text-sm text-gray-300">-</span>
                                    </div>
                                    <div class="bg-black/30 rounded p-2">
                                        <span class="text-xs text-gray-500 block">识别到的帮会</span>
                                        <span id="detectedGuild2" class="text-sm text-gray-300">-</span>
                                    </div>
                                </div>
                                <p id="manualInputHint" class="text-xs text-yellow-500 hidden">
                                    <i class="fas fa-exclamation-triangle mr-1"></i>未识别到帮会名称，请手动输入
                                </p>
                            </div>
                        </div>

                        <!-- 帮战信息输入（移到下方，仅在需要时显示） -->
                        <div id="battleInfoSection" class="input-section rounded-sm p-3 mb-4 hidden">
                            <h3 class="text-xs font-medium text-gray-400 mb-2 flex items-center">
                                <i class="fas fa-edit mr-2"></i>本场帮战信息
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">帮战时间</label>
                                    <input type="datetime-local" id="battleDateTime" class="custom-input w-full px-2 py-1.5 text-sm rounded-sm">
                                    <div class="flex gap-2 mt-2">
                                        <button onclick="setQuickTime('20:00')" class="action-btn px-2 py-1 text-xs rounded-sm flex-1">
                                            <i class="far fa-clock mr-1"></i>20:00
                                        </button>
                                        <button onclick="setQuickTime('20:30')" class="action-btn px-2 py-1 text-xs rounded-sm flex-1">
                                            <i class="far fa-clock mr-1"></i>20:30
                                        </button>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">数据类型</label>
                                    <select id="battleType" class="custom-input w-full px-2 py-1.5 text-sm rounded-sm">
                                        <option value="guild" selected>帮战数据</option>
                                        <option value="practice">约战数据</option>
                                    </select>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">帮会 1</label>
                                    <input type="text" id="guild1NameInput" placeholder="输入帮会1名称" class="custom-input w-full px-2 py-1.5 text-sm rounded-sm">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">帮会 2</label>
                                    <input type="text" id="guild2NameInput" placeholder="输入帮会2名称" class="custom-input w-full px-2 py-1.5 text-sm rounded-sm">
                                </div>
                            </div>
                        </div>
                        
                        <!-- 编辑模式按钮（选中左侧数据时显示） -->
                        <div id="editModeSection" class="input-section rounded-sm p-3 mb-4 hidden">
                            <h3 class="text-xs font-medium text-jade mb-2 flex items-center">
                                <i class="fas fa-pen mr-2"></i>编辑场次信息
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">帮战时间</label>
                                    <input type="datetime-local" id="editBattleDateTime" class="custom-input w-full px-2 py-1.5 text-sm rounded-sm">
                                    <div class="flex gap-2 mt-2">
                                        <button onclick="setEditQuickTime('20:00')" class="action-btn px-2 py-1 text-xs rounded-sm flex-1">
                                            <i class="far fa-clock mr-1"></i>20:00
                                        </button>
                                        <button onclick="setEditQuickTime('20:30')" class="action-btn px-2 py-1 text-xs rounded-sm flex-1">
                                            <i class="far fa-clock mr-1"></i>20:30
                                        </button>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">数据类型</label>
                                    <select id="editBattleType" class="custom-input w-full px-2 py-1.5 text-sm rounded-sm">
                                        <option value="guild">帮战数据</option>
                                        <option value="practice">约战数据</option>
                                    </select>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">帮会 1</label>
                                    <input type="text" id="editGuild1Name" placeholder="输入帮会1名称" class="custom-input w-full px-2 py-1.5 text-sm rounded-sm">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">帮会 2</label>
                                    <input type="text" id="editGuild2Name" placeholder="输入帮会2名称" class="custom-input w-full px-2 py-1.5 text-sm rounded-sm">
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="saveEditBattle()" class="primary-btn px-4 py-2 text-sm rounded-sm flex-1">
                                    <i class="fas fa-save mr-2"></i>保存修改
                                </button>
                                <button onclick="cancelEditBattle()" class="action-btn px-4 py-2 text-sm rounded-sm">
                                    <i class="fas fa-times mr-2"></i>取消
                                </button>
                            </div>
                        </div>

                        <!-- 导入按钮 -->
                        <div class="text-center mt-auto pt-4">
                            <button id="importBtn" class="primary-btn text-sm font-medium py-2 px-6 rounded-sm inline-flex items-center" disabled>
                                <i class="fas fa-plus mr-2"></i>添加本场数据
                            </button>
                        </div>
                        
                        <!-- 快捷操作 -->
                        <div class="mt-4 pt-4 border-t border-gray-800 grid grid-cols-2 gap-2">
                            <button onclick="exportAllBattleData()" class="action-btn px-2 py-2 text-xs rounded-sm whitespace-nowrap">
                                <i class="fas fa-download mr-1"></i>导出备份
                            </button>
                            <button onclick="document.getElementById('importAllFileInput').click()" class="action-btn px-2 py-2 text-xs rounded-sm whitespace-nowrap">
                                <i class="fas fa-upload mr-1"></i>导入备份
                            </button>
                            <input type="file" id="importAllFileInput" accept=".json" class="hidden" onchange="importAllBattleData(event)">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 默认文件夹设置 -->
        <div class="main-card rounded-sm p-4 mb-6">
            <div class="corner-decoration top-left"></div>
            <div class="corner-decoration top-right"></div>
            <div class="corner-decoration bottom-left"></div>
            <div class="corner-decoration bottom-right"></div>
            
            <div class="relative">
                <h3 class="text-xs font-medium text-gray-400 mb-2 flex items-center">
                    <i class="fas fa-folder-open mr-2"></i>默认数据文件夹
                </h3>
                <div class="flex items-center gap-2">
                    <input type="text" id="defaultFolder" class="custom-input flex-1 px-3 py-2 text-sm rounded-sm"
                           value="C:/Users/31352/AppData/LocalLow/netease/逆水寒手游桌面版/"
                           placeholder="输入默认文件夹路径...">
                    <button id="saveFolderBtn" class="action-btn px-3 py-2 text-xs rounded-sm">
                        <i class="fas fa-save mr-1"></i>保存
                    </button>
                    <button id="openFolderBtn" class="action-btn px-3 py-2 text-xs rounded-sm">
                        <i class="fas fa-folder mr-1"></i>打开
                    </button>
                </div>
                <p class="text-xs text-gray-600 mt-1">提示：保存后将记住您的默认文件夹位置</p>
            </div>
        </div>
        
        <!-- 页脚 -->
        <footer class="mt-8">
            <div class="footer-divider mb-4"></div>
            <div class="text-center text-gray-600 text-xs tracking-wider">
                <p class="mb-1">逆水寒战斗分析系统 v4.0.0 · 多场数据导入管理</p>
                <div class="flex justify-center gap-3 opacity-50">
                    <i class="fas fa-feather-alt"></i>
                    <i class="fas fa-dragon"></i>
                    <i class="fas fa-fan"></i>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // ==================== v4.0.0 多场数据管理 ====================
        
        const MULTI_BATTLE_KEY = 'multiBattleCache_v4';
        const MAX_BATTLE_SELECT = 10; // 最多选择10场进行分析
        let multiBattleData = [];
        let selectedBattleIds = new Set(); // 改为多选
        let isAutoSelectEnabled = true; // 是否启用自动选择近10场
        let processedData = {};
        let parsedFileInfo = null; // 存储解析后的文件信息
        const DEFAULT_FOLDER = 'C:/Users/31352/AppData/LocalLow/netease/逆水寒手游桌面版/';

        // DOM元素
        let importBtn, csvFileInput, statusIndicator, statusText, uploadZone;
        let defaultFolderInput, saveFolderBtn, openFolderBtn;
        let battleDateTimeInput, guild1NameInput, guild2NameInput, battleTypeInput;
        let parseResult, detectedGuild1, detectedGuild2, manualInputHint, battleInfoSection;
        let editModeSection, editBattleDateTime, editBattleType, editGuild1Name, editGuild2Name;
        let currentEditingBattleId = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化DOM元素
            importBtn = document.getElementById('importBtn');
            csvFileInput = document.getElementById('csvFileInput');
            statusIndicator = document.getElementById('statusIndicator');
            statusText = document.getElementById('statusText');
            uploadZone = document.getElementById('uploadZone');
            defaultFolderInput = document.getElementById('defaultFolder');
            saveFolderBtn = document.getElementById('saveFolderBtn');
            openFolderBtn = document.getElementById('openFolderBtn');
            battleDateTimeInput = document.getElementById('battleDateTime');
            guild1NameInput = document.getElementById('guild1NameInput');
            guild2NameInput = document.getElementById('guild2NameInput');
            battleTypeInput = document.getElementById('battleType');
            parseResult = document.getElementById('parseResult');
            detectedGuild1 = document.getElementById('detectedGuild1');
            detectedGuild2 = document.getElementById('detectedGuild2');
            manualInputHint = document.getElementById('manualInputHint');
            battleInfoSection = document.getElementById('battleInfoSection');
            editModeSection = document.getElementById('editModeSection');
            editBattleDateTime = document.getElementById('editBattleDateTime');
            editBattleType = document.getElementById('editBattleType');
            editGuild1Name = document.getElementById('editGuild1Name');
            editGuild2Name = document.getElementById('editGuild2Name');

            // 加载多场数据缓存
            loadMultiBattleData();
            
            // 设置默认时间为最近的周六 20:00
            setDefaultSaturdayTime();

            // 加载保存的文件夹路径
            const savedFolder = localStorage.getItem('defaultDataFolder');
            if (savedFolder) defaultFolderInput.value = savedFolder;

            // 事件绑定
            saveFolderBtn.addEventListener('click', () => {
                const folderPath = defaultFolderInput.value.trim();
                if (folderPath) {
                    localStorage.setItem('defaultDataFolder', folderPath);
                    alert('默认文件夹路径已保存！');
                }
            });

            openFolderBtn.addEventListener('click', () => {
                const folderPath = defaultFolderInput.value.trim();
                if (folderPath) {
                    alert('请手动打开文件夹：\n' + folderPath + '\n\n提示：将此路径复制到文件资源管理器地址栏中访问');
                }
            });

            importBtn.addEventListener('click', handleImportClick);
            
            uploadZone.addEventListener('click', (e) => {
                if (e.target !== csvFileInput) csvFileInput.click();
            });

            // 拖拽事件
            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.classList.add('dragover');
            });
            uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
            uploadZone.addEventListener('drop', async (e) => {
                e.preventDefault();
                uploadZone.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].name.endsWith('.csv')) {
                    await handleFileParse(files[0]);
                } else {
                    alert('请上传CSV文件');
                }
            });

            csvFileInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (file) {
                    await handleFileParse(file);
                    csvFileInput.value = '';
                }
            });
        });

        // 获取最近的周六日期
        function getNearestSaturday() {
            const now = new Date();
            const dayOfWeek = now.getDay(); // 0是周日，6是周六
            const daysUntilSaturday = (6 - dayOfWeek + 7) % 7;
            const saturday = new Date(now);
            saturday.setDate(now.getDate() + daysUntilSaturday);
            return saturday;
        }
        
        // 设置默认时间为最近周六 20:00
        function setDefaultSaturdayTime() {
            const saturday = getNearestSaturday();
            saturday.setHours(20, 0, 0, 0);
            saturday.setMinutes(saturday.getMinutes() - saturday.getTimezoneOffset());
            battleDateTimeInput.value = saturday.toISOString().slice(0, 16);
        }
        
        // 设置快捷时间
        function setQuickTime(timeStr) {
            const currentValue = battleDateTimeInput.value;
            if (!currentValue) {
                setDefaultSaturdayTime();
            }
            const date = new Date(battleDateTimeInput.value);
            const [hours, minutes] = timeStr.split(':').map(Number);
            date.setHours(hours, minutes, 0, 0);
            date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
            battleDateTimeInput.value = date.toISOString().slice(0, 16);
        }
        
        // 设置编辑模式快捷时间
        function setEditQuickTime(timeStr) {
            if (!editBattleDateTime.value) return;
            const date = new Date(editBattleDateTime.value);
            const [hours, minutes] = timeStr.split(':').map(Number);
            date.setHours(hours, minutes, 0, 0);
            date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
            editBattleDateTime.value = date.toISOString().slice(0, 16);
        }

        // 加载多场数据
        function loadMultiBattleData() {
            try {
                const cached = localStorage.getItem(MULTI_BATTLE_KEY);
                if (cached) {
                    multiBattleData = JSON.parse(cached);
                    // 数据格式兼容处理
                    multiBattleData = multiBattleData.map(battle => {
                        // 兼容旧数据：如果 guilds 存在但 data 不存在，进行转换
                        if (battle.guilds && !battle.data) {
                            battle.data = battle.guilds;
                        }
                        // 兼容旧数据：如果 data 不存在，初始化为空对象
                        if (!battle.data) {
                            battle.data = {};
                        }
                        return battle;
                    });
                }
            } catch (e) {
                console.error('加载多场数据失败:', e);
                multiBattleData = [];
            }
            // 自动选择（如果不足10场则全选）
            autoSelectIfEmpty();
            updateBattleListUI();
        }

        // 保存多场数据
        function saveMultiBattleData() {
            try {
                localStorage.setItem(MULTI_BATTLE_KEY, JSON.stringify(multiBattleData));
            } catch (e) {
                console.error('保存多场数据失败:', e);
            }
        }

        // 当前单选标识（用于导入到当前分析系统）
        let activeBattleId = null;
        
        // 更新多场数据列表UI
        function updateBattleListUI() {
            const container = document.getElementById('multiBattleList');
            const badge = document.getElementById('battleCountBadge');
            const loadBtn = document.getElementById('loadToAnalysisBtn');
            const selectedCount = document.getElementById('selectedCount');
            const autoSelectCheckbox = document.getElementById('autoSelectCheckbox');
            
            badge.textContent = `${multiBattleData.length} 场`;
            selectedCount.textContent = selectedBattleIds.size;
            
            // 同步自动选择复选框状态
            if (autoSelectCheckbox) {
                autoSelectCheckbox.checked = isAutoSelectEnabled;
            }
            
            if (multiBattleData.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-500 py-6 text-sm">
                        <i class="fas fa-inbox text-xl mb-2 block"></i>
                        暂无导入数据
                    </div>`;
                container.style.maxHeight = 'none';
                loadBtn.disabled = true;
                return;
            }

            // 按时间排序（最新的在前）
            const sortedData = [...multiBattleData].sort((a, b) => b.timestamp - a.timestamp);
            
            // 判断是否显示选择框（超过10场才显示）
            const showCheckboxes = sortedData.length > MAX_BATTLE_SELECT;
            
            // 更新选择控件显示
            const selectionControls = document.getElementById('selectionControls');
            const autoSelectHint = document.getElementById('autoSelectHint');
            const autoSelectCount = document.getElementById('autoSelectCount');
            if (selectionControls && autoSelectHint) {
                if (showCheckboxes) {
                    selectionControls.classList.remove('hidden');
                    autoSelectHint.classList.add('hidden');
                } else {
                    selectionControls.classList.add('hidden');
                    autoSelectHint.classList.remove('hidden');
                    if (autoSelectCount) autoSelectCount.textContent = sortedData.length;
                }
            }
            
            container.innerHTML = sortedData.map((battle, index) => {
                const date = new Date(battle.dateTime);
                const dateStr = date.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                // 优先使用手动输入的帮会名
                const guild1Name = battle.guild1Name || (battle.guildNames ? battle.guildNames[0] : null) || '帮会1';
                const guild2Name = battle.guild2Name || (battle.guildNames ? battle.guildNames[1] : null) || '帮会2';
                const guildNames = `${guild1Name} vs ${guild2Name}`;
                // 计算总人数 - 兼容不同数据结构
                let totalPlayers = 0;
                if (battle.data) {
                    totalPlayers = Object.values(battle.data).reduce((sum, players) => {
                        if (Array.isArray(players)) {
                            return sum + players.length;
                        }
                        return sum;
                    }, 0);
                }
                const isChecked = selectedBattleIds.has(battle.id);
                const isActive = activeBattleId === battle.id;
                const isLatest = index === 0;
                const isEditing = currentEditingBattleId === battle.id;
                // 数据类型标签
                const typeLabel = battle.battleType === 'practice' ? 
                    '<span class="text-xs bg-purple-500/20 text-purple-400 px-1.5 py-0.5 rounded">约战</span>' :
                    '<span class="text-xs bg-red-500/20 text-red-400 px-1.5 py-0.5 rounded">帮战</span>';
                
                return `
                    <div class="battle-item rounded-sm p-3 ${isActive ? 'active' : ''} ${isEditing ? 'border-jade' : ''}">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2 flex-1 min-w-0" onclick="setActiveBattle('${battle.id}')">
                                ${showCheckboxes ? `<input type="checkbox" class="battle-checkbox" ${isChecked ? 'checked' : ''} 
                                       onclick="event.stopPropagation(); toggleMultiSelect('${battle.id}')">` : ''}
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2">
                                        ${typeLabel}
                                        ${isLatest ? '<span class="text-xs bg-jade/20 text-jade px-1.5 py-0.5 rounded">最新</span>' : ''}
                                        ${isActive ? '<span class="text-xs bg-yellow-500/20 text-yellow-400 px-1.5 py-0.5 rounded">当前</span>' : ''}
                                        ${isEditing ? '<span class="text-xs bg-jade/30 text-jade px-1.5 py-0.5 rounded"><i class="fas fa-pen mr-1"></i>编辑中</span>' : ''}
                                        <span class="text-xs text-gray-500">#${sortedData.length - index}</span>
                                    </div>
                                    <div class="text-sm text-gray-300 mt-1 truncate">${guildNames}</div>
                                    <div class="text-xs text-gray-500 mt-0.5">
                                        <i class="far fa-clock mr-1"></i>${dateStr}
                                        <span class="mx-1">|</span>
                                        <i class="fas fa-users mr-1"></i>${totalPlayers}人
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-1 ml-2">
                                <button onclick="event.stopPropagation(); editBattle('${battle.id}')" 
                                        class="p-1.5 text-gray-500 hover:text-jade rounded" title="编辑">
                                    <i class="fas fa-pen text-xs"></i>
                                </button>
                                <button onclick="event.stopPropagation(); deleteBattle('${battle.id}')" 
                                        class="p-1.5 text-gray-500 hover:text-red-400 rounded" title="删除">
                                    <i class="fas fa-trash-alt text-xs"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // 动态调整列表高度：>3场时固定高度显示滚动条（固定显示3场的高度），<=3场时自适应
            if (sortedData.length <= 3) {
                container.style.maxHeight = 'none';
            } else {
                container.style.maxHeight = '240px';
            }
            
            // 启用导入按钮逻辑：<10场需要activeBattleId，≥10场需要selectedBattleIds
            if (showCheckboxes) {
                loadBtn.disabled = selectedBattleIds.size === 0;
            } else {
                loadBtn.disabled = !activeBattleId;
            }
        }

        // 设置当前激活的场次（单选，用于导入到分析系统）
        function setActiveBattle(battleId) {
            activeBattleId = activeBattleId === battleId ? null : battleId;
            // 取消编辑模式
            if (currentEditingBattleId && currentEditingBattleId !== battleId) {
                cancelEditBattle();
            }
            updateBattleListUI();
        }
        
        // 编辑场次信息
        function editBattle(battleId) {
            const battle = multiBattleData.find(b => b.id === battleId);
            if (!battle) return;
            
            currentEditingBattleId = battleId;
            
            // 填充编辑表单
            const date = new Date(battle.dateTime);
            date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
            editBattleDateTime.value = date.toISOString().slice(0, 16);
            editBattleType.value = battle.battleType || 'guild';
            editGuild1Name.value = battle.guild1Name || '';
            editGuild2Name.value = battle.guild2Name || '';
            
            // 显示编辑区域，隐藏其他区域
            editModeSection.classList.remove('hidden');
            battleInfoSection.classList.add('hidden');
            parseResult.classList.add('hidden');
            
            // 设置当前编辑的场次为激活状态
            activeBattleId = battleId;
            updateBattleListUI();
        }
        
        // 保存编辑的场次
        function saveEditBattle() {
            if (!currentEditingBattleId) return;
            
            const battleIndex = multiBattleData.findIndex(b => b.id === currentEditingBattleId);
            if (battleIndex === -1) return;
            
            const dateTime = editBattleDateTime.value;
            const battleType = editBattleType.value;
            const guild1Name = editGuild1Name.value.trim();
            const guild2Name = editGuild2Name.value.trim();
            
            if (!dateTime) {
                alert('请填写帮战时间');
                return;
            }
            
            if (!guild1Name || !guild2Name) {
                alert('请填写双方帮会名称');
                return;
            }
            
            const battleTime = new Date(dateTime);
            
            // 更新数据
            multiBattleData[battleIndex].dateTime = dateTime;
            multiBattleData[battleIndex].timestamp = battleTime.getTime();
            multiBattleData[battleIndex].battleType = battleType;
            multiBattleData[battleIndex].guild1Name = guild1Name;
            multiBattleData[battleIndex].guild2Name = guild2Name;
            
            // 重新排序
            multiBattleData.sort((a, b) => b.timestamp - a.timestamp);
            
            saveMultiBattleData();
            updateBattleListUI();
            cancelEditBattle();
            
            showStatus('场次信息已更新');
            setTimeout(hideStatus, 2000);
        }
        
        // 取消编辑
        function cancelEditBattle() {
            currentEditingBattleId = null;
            editModeSection.classList.add('hidden');
            editBattleDateTime.value = '';
            editBattleType.value = 'guild';
            editGuild1Name.value = '';
            editGuild2Name.value = '';
        }

        // 切换多选（用于批量导入）
        function toggleMultiSelect(battleId) {
            if (selectedBattleIds.has(battleId)) {
                selectedBattleIds.delete(battleId);
            } else {
                // 最多选择10场
                if (selectedBattleIds.size >= MAX_BATTLE_SELECT) {
                    alert(`最多只能选择 ${MAX_BATTLE_SELECT} 场数据`);
                    return;
                }
                selectedBattleIds.add(battleId);
            }
            updateBattleListUI();
        }

        // 全选/取消全选
        // 根据isAutoSelectEnabled决定行为：
        // - 自动选择开启：全选近10场
        // - 自动选择关闭：可以全选所有（超过10场时也只选10场，受MAX_BATTLE_SELECT限制）
        function toggleSelectAll() {
            const sortedData = [...multiBattleData].sort((a, b) => b.timestamp - a.timestamp);
            if (selectedBattleIds.size > 0) {
                // 已有选中，取消全选（清空）
                selectedBattleIds.clear();
            } else {
                // 全选近10场
                sortedData.slice(0, MAX_BATTLE_SELECT).forEach(b => selectedBattleIds.add(b.id));
            }
            updateBattleListUI();
        }

        // 自动选择逻辑
        // <=10场：自动全选所有数据
        // >10场：根据isAutoSelectEnabled决定是否自动选近10场
        function autoSelectIfEmpty() {
            if (multiBattleData.length === 0) return;
            
            const sortedData = [...multiBattleData].sort((a, b) => b.timestamp - a.timestamp);
            
            // 如果数据量不超过10场，自动全选所有
            if (sortedData.length <= MAX_BATTLE_SELECT) {
                selectedBattleIds.clear();
                sortedData.forEach(b => selectedBattleIds.add(b.id));
            } else {
                // 数据量超过10场
                if (isAutoSelectEnabled) {
                    // 自动选择近10场（最新的10场）
                    selectedBattleIds.clear();
                    sortedData.slice(0, MAX_BATTLE_SELECT).forEach(b => selectedBattleIds.add(b.id));
                }
                // 如果取消自动选择，则不自动选择任何数据，让用户手动选择
            }
        }
        
        // 切换自动选择开关
        function toggleAutoSelect(checked) {
            isAutoSelectEnabled = checked;
            if (isAutoSelectEnabled && multiBattleData.length > MAX_BATTLE_SELECT) {
                // 开启自动选择，且数据量>10场，自动选近10场
                const sortedData = [...multiBattleData].sort((a, b) => b.timestamp - a.timestamp);
                selectedBattleIds.clear();
                sortedData.slice(0, MAX_BATTLE_SELECT).forEach(b => selectedBattleIds.add(b.id));
            } else if (!isAutoSelectEnabled) {
                // 关闭自动选择，清空选择，让用户手动选择
                selectedBattleIds.clear();
            }
            updateBattleListUI();
        }
        
        // 显示自动选择帮助说明
        function showAutoSelectHelp() {
            alert('【自动选近10场】功能说明：\n\n' +
                  '✓ 勾选状态：自动选择最近的10场数据进行解析\n' +
                  '✗ 取消勾选：关闭自动选择，需手动勾选要解析的场次\n\n' +
                  '注意：手动选择时可以只选1场或任意多场，\n系统不会自动补足到10场。');
        }

        // 删除单场
        function deleteBattle(battleId) {
            if (!confirm('确定要删除这场帮战数据吗？')) return;
            multiBattleData = multiBattleData.filter(b => b.id !== battleId);
            selectedBattleIds.delete(battleId);
            if (activeBattleId === battleId) activeBattleId = null;
            saveMultiBattleData();
            // 删除后重新应用自动选择逻辑（如果数据量变化可能影响选择）
            autoSelectIfEmpty();
            updateBattleListUI();
        }

        // 清空所有场次
        function clearAllBattleData() {
            if (!confirm('确定要清空所有帮战数据吗？此操作不可恢复。')) return;
            multiBattleData = [];
            selectedBattleIds.clear();
            activeBattleId = null;
            saveMultiBattleData();
            updateBattleListUI();
            showStatus('所有数据已清空');
            setTimeout(hideStatus, 2000);
        }

        // 导入选中到分析系统
        function loadSelectedToAnalysis() {
            let battlesToImport = [];
            const showCheckboxes = multiBattleData.length > MAX_BATTLE_SELECT;
            // 按时间排序（最新的在前）
            const sortedData = [...multiBattleData].sort((a, b) => b.timestamp - a.timestamp);
            
            if (showCheckboxes) {
                // ≥10场：使用复选框勾选的场次作为导入数据
                if (selectedBattleIds.size === 0) {
                    alert('请至少勾选一场数据');
                    return;
                }
                // 按时间顺序获取勾选的场次（不再补足，用户选多少就导入多少）
                battlesToImport = sortedData.filter(b => selectedBattleIds.has(b.id));
            } else {
                // <10场：使用当前激活的单选那场
                if (!activeBattleId) {
                    alert('请点击选择一场数据');
                    return;
                }
                const battle = multiBattleData.find(b => b.id === activeBattleId);
                if (battle) battlesToImport = [battle];
            }
            
            if (battlesToImport.length === 0) {
                alert('请至少选择一场数据');
                return;
            }

            // 获取帮会名称（优先使用手动输入的帮会名）- 使用最后选中那场的数据
            const lastBattle = battlesToImport[battlesToImport.length - 1];
            const guild1Name = lastBattle.guild1Name || (lastBattle.guildNames ? lastBattle.guildNames[0] : null) || '帮会1';
            const guild2Name = lastBattle.guild2Name || (lastBattle.guildNames ? lastBattle.guildNames[1] : null) || '帮会2';
            
            // 保存帮会名称到分析系统使用的键
            localStorage.setItem('xg_nsh_guild1Name', guild1Name);
            localStorage.setItem('xg_nsh_guild2Name', guild2Name);
            
            // 如果只选中一场，直接导入到分析系统
            if (battlesToImport.length === 1) {
                const battle = battlesToImport[0];
                localStorage.setItem('battleData', JSON.stringify(battle.data));
                const leagueData = calculateLeagueData(battle.data);
                localStorage.setItem('leagueBattleData', JSON.stringify(leagueData));
                localStorage.setItem('currentBattleInfo', JSON.stringify({
                    id: battle.id,
                    dateTime: battle.dateTime,
                    guild1Name: battle.guild1Name,
                    guild2Name: battle.guild2Name
                }));
            } else {
                // 如果选中多场，保存为多场缓存
                const multiCache = battlesToImport.map(b => ({
                    id: b.id,
                    dateTime: b.dateTime,
                    timestamp: b.timestamp,
                    guild1Name: b.guild1Name,
                    guild2Name: b.guild2Name,
                    guilds: b.data
                }));
                localStorage.setItem(MULTI_BATTLE_KEY, JSON.stringify(multiCache));
                
                // 同时保存最后一场为当前分析数据
                const lastBattle = battlesToImport[battlesToImport.length - 1];
                localStorage.setItem('battleData', JSON.stringify(lastBattle.data));
                const leagueData = calculateLeagueData(lastBattle.data);
                localStorage.setItem('leagueBattleData', JSON.stringify(leagueData));
                localStorage.setItem('currentBattleInfo', JSON.stringify({
                    id: lastBattle.id,
                    dateTime: lastBattle.dateTime,
                    guild1Name: lastBattle.guild1Name,
                    guild2Name: lastBattle.guild2Name
                }));
            }

            window.location.href = '../xg_guild_analysis/xg_guild_analysis_main.html';
        }

        // 导出所有数据
        function exportAllBattleData() {
            if (multiBattleData.length === 0) {
                alert('没有数据可导出');
                return;
            }
            
            const exportData = {
                version: '4.0.0',
                exportTime: new Date().toISOString(),
                battles: multiBattleData
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `帮战数据备份_${new Date().toLocaleDateString('zh-CN')}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showStatus('数据导出成功');
            setTimeout(hideStatus, 2000);
        }

        // 导入备份数据
        function importAllBattleData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const importData = JSON.parse(e.target.result);
                    if (importData.battles && Array.isArray(importData.battles)) {
                        // 合并数据，避免重复
                        let importedCount = 0;
                        importData.battles.forEach(battle => {
                            // 数据格式兼容处理
                            if (battle.guilds && !battle.data) {
                                battle.data = battle.guilds;
                            }
                            if (!battle.data) {
                                battle.data = {};
                            }
                            
                            const exists = multiBattleData.some(b => b.id === battle.id);
                            if (!exists) {
                                multiBattleData.push(battle);
                                importedCount++;
                            }
                        });
                        
                        // 按时间排序（不再限制数量，可以无限存储）
                        multiBattleData.sort((a, b) => b.timestamp - a.timestamp);
                        
                        saveMultiBattleData();
                        // 导入后自动选择
                        autoSelectIfEmpty();
                        updateBattleListUI();
                        showStatus(`成功导入 ${importedCount} 场数据`);
                    } else {
                        alert('数据格式不正确');
                    }
                } catch (err) {
                    alert('文件解析失败: ' + err.message);
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // 处理文件解析（第一步：解析但不导入）
        async function handleFileParse(file) {
            showStatus('正在解析CSV文件...');
            
            try {
                const result = await loadDataFromCSV(file);
                if (Object.keys(result).length === 0) {
                    showStatus('未找到有效的帮会数据');
                    return;
                }

                const guildNames = Object.keys(result);
                parsedFileInfo = {
                    file: file,
                    data: result,
                    guildNames: guildNames,
                    totalPlayers: Object.values(result).reduce((sum, players) => sum + players.length, 0)
                };

                // 显示解析结果
                parseResult.classList.remove('hidden');
                detectedGuild1.textContent = guildNames[0] || '未识别';
                detectedGuild2.textContent = guildNames[1] || '未识别';

                // 判断是否识别到帮会名称
                const hasValidGuildNames = guildNames.length >= 2 && 
                    !guildNames.some(name => name.startsWith('帮会') && /^帮会\d+$/.test(name));

                // 始终显示输入区域（时间必须手动确认）
                battleInfoSection.classList.remove('hidden');
                
                if (hasValidGuildNames) {
                    // 识别到有效帮会名，自动填充
                    manualInputHint.classList.add('hidden');
                    guild1NameInput.value = guildNames[0] || '';
                    guild2NameInput.value = guildNames[1] || '';
                } else {
                    // 未识别到帮会名，提示手动输入
                    manualInputHint.classList.remove('hidden');
                    guild1NameInput.value = '';
                    guild2NameInput.value = '';
                }

                // 启用导入按钮
                importBtn.disabled = false;
                hideStatus();
                
            } catch (error) {
                console.error('CSV文件解析失败:', error);
                showStatus('文件解析失败: ' + error.message);
            }
        }

        // 处理导入点击（第二步：确认导入）
        async function handleImportClick() {
            if (!parsedFileInfo) return;

            const dateTime = battleDateTimeInput.value;
            const battleType = battleTypeInput.value;
            let guild1Name = guild1NameInput.value.trim();
            let guild2Name = guild2NameInput.value.trim();
            
            if (!dateTime) {
                alert('请填写帮战时间');
                battleInfoSection.classList.remove('hidden');
                return;
            }

            // 如果没有手动输入帮会名，使用识别到的
            if (!guild1Name && parsedFileInfo.guildNames[0]) {
                guild1Name = parsedFileInfo.guildNames[0];
            }
            if (!guild2Name && parsedFileInfo.guildNames[1]) {
                guild2Name = parsedFileInfo.guildNames[1];
            }

            if (!guild1Name || !guild2Name) {
                alert('请填写双方帮会名称');
                battleInfoSection.classList.remove('hidden');
                return;
            }

            showStatus('正在导入数据...');

            // 创建场次数据
            const battleTime = new Date(dateTime);
            const battleId = `battle_${battleTime.getTime()}_${Math.random().toString(36).substr(2, 9)}`;
            
            const newBattle = {
                id: battleId,
                dateTime: dateTime,
                timestamp: battleTime.getTime(),
                fileName: parsedFileInfo.file.name,
                guild1Name: guild1Name,
                guild2Name: guild2Name,
                battleType: battleType, // 数据类型：帮战/约战
                guildNames: parsedFileInfo.guildNames, // 保存原始识别的帮会名
                data: parsedFileInfo.data,
                importTime: new Date().toISOString()
            };
            
            // 直接添加新数据，不检查同时间段（允许同一时间段有多场）
            multiBattleData.push(newBattle);
            
            // 按时间排序（不限制存储数量）
            multiBattleData.sort((a, b) => b.timestamp - a.timestamp);
            
            saveMultiBattleData();
            
            // 根据自动选择设置处理
            if (multiBattleData.length <= MAX_BATTLE_SELECT) {
                // <=10场：全选所有
                selectedBattleIds.clear();
                multiBattleData.forEach(b => selectedBattleIds.add(b.id));
            } else if (isAutoSelectEnabled) {
                // >10场且自动选择开启：选近10场
                selectedBattleIds.clear();
                multiBattleData.slice(0, MAX_BATTLE_SELECT).forEach(b => selectedBattleIds.add(b.id));
            }
            // 如果>10场且自动选择关闭，不自动添加，让用户手动选择
            
            updateBattleListUI();
            
            // 重置表单
            resetImportForm();
            
            showStatus(`成功导入！共 ${parsedFileInfo.totalPlayers} 条数据`);
            setTimeout(hideStatus, 2000);
        }

        // 重置导入表单
        function resetImportForm() {
            parsedFileInfo = null;
            parseResult.classList.add('hidden');
            battleInfoSection.classList.add('hidden');
            manualInputHint.classList.add('hidden');
            editModeSection.classList.add('hidden');
            currentEditingBattleId = null;
            importBtn.disabled = true;
            guild1NameInput.value = '';
            guild2NameInput.value = '';
            battleTypeInput.value = 'guild'; // 重置为默认帮战
            
            // 重置时间为最近的周六 20:00
            setDefaultSaturdayTime();
        }

        // 解析CSV行
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else current += char;
            }
            result.push(current);
            return result;
        }

        // 从CSV加载数据
        function loadDataFromCSV(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const text = e.target.result;
                        const lines = text.split('\n').filter(line => line.trim());
                        const result = {};
                        let currentGuild = null;
                        let headers = null;
                        let guildData = [];
                        let guildIndex = 0;

                        for (let i = 0; i < lines.length; i++) {
                            const line = lines[i].trim();
                            if (!line) continue;
                            const values = parseCSVLine(line);

                            // 帮会标识行
                            if (values.length === 2) {
                                const guildName = values[0].replace(/"/g, '').trim();
                                const memberCount = values[1].replace(/"/g, '').trim();
                                const isNumber = /^\d+$/.test(memberCount);
                                
                                if (guildName === 'nil' && memberCount === 'nil') {
                                    if (currentGuild && guildData.length > 0) {
                                        result[currentGuild] = guildData;
                                    }
                                    guildIndex++;
                                    currentGuild = `帮会${guildIndex}`;
                                    guildData = [];
                                    headers = null;
                                    continue;
                                }
                                
                                if (isNumber && guildName.length > 0 && guildName.length < 20) {
                                    if (currentGuild && guildData.length > 0) {
                                        result[currentGuild] = guildData;
                                    }
                                    currentGuild = guildName;
                                    guildData = [];
                                    headers = null;
                                    continue;
                                }
                            }

                            // 表头行
                            if (!headers && values.length >= 2 && 
                                (values[0].includes('玩家') || values[1].includes('职业'))) {
                                headers = values.map(v => v.replace(/"/g, '').trim());
                                continue;
                            }

                            // 数据行
                            if (headers && values.length >= headers.length) {
                                const player = {};
                                headers.forEach((header, index) => {
                                    player[header] = values[index] ? values[index].replace(/"/g, '').trim() : '';
                                });
                                const nonEmptyValues = Object.values(player).filter(v => v && v.trim());
                                if (nonEmptyValues.length > 2 && !player['玩家名字'].includes('玩家')) {
                                    // 数值字段处理
                                    const numericFields = ['击败/清泉', '助攻', '资源', '对玩家伤害', '人伤卸甲',
                                                            '对建筑伤害', '破塔卸甲', '治疗值', '承受伤害', '重伤', '复活/清泉', '焚骨'];
                                    player['击败'] = 0;
                                    player['破泉'] = 0;
                                    player['化羽'] = 0;
                                    player['清泉'] = 0;
                                    player['复活'] = 0;

                                    numericFields.forEach(field => {
                                        if (player[field] !== undefined && player[field] !== '') {
                                            const value = player[field].replace(/,/g, '');
                                            if (field === '击败/清泉') {
                                                if (value.includes('/')) {
                                                    const parts = value.split('/');
                                                    player['击败'] = parseInt(parts[0].trim()) || 0;
                                                    player['破泉'] = parseInt(parts[1].trim()) || 0;
                                                } else {
                                                    player['击败'] = parseInt(value.trim()) || 0;
                                                }
                                            } else if (field === '复活/清泉') {
                                                const profession = player['职业'];
                                                if (value.includes('/')) {
                                                    const parts = value.split('/');
                                                    const part0 = parseInt(parts[0].trim()) || 0;
                                                    const part1 = parseInt(parts[1].trim()) || 0;
                                                    if (profession === '潮光') {
                                                        player['复活'] = part0;
                                                        player['清泉'] = part1;
                                                    } else if (profession === '素问' || profession === '鸿音') {
                                                        player['复活'] = part0;
                                                        player['清泉'] = part1;
                                                    } else {
                                                        player['化羽'] = part0;
                                                        player['清泉'] = part1;
                                                    }
                                                } else {
                                                    const singleValue = parseInt(value.trim()) || 0;
                                                    if (profession === '潮光') {
                                                        player['清泉'] = singleValue;
                                                    } else if (profession === '素问' || profession === '鸿音') {
                                                        player['复活'] = singleValue;
                                                    } else {
                                                        player['化羽'] = singleValue;
                                                    }
                                                }
                                            } else {
                                                player[field] = isNaN(value) ? value : parseFloat(value);
                                            }
                                        }
                                    });
                                    
                                    // 处理单独的化羽字段（如果CSV中有单独的化羽列）
                                    if (player['化羽'] !== undefined && player['化羽'] !== '' && player['化羽'] !== 0) {
                                        const huayuValue = parseFloat(player['化羽']) || 0;
                                        if (huayuValue > 0) {
                                            player['化羽'] = huayuValue;
                                        }
                                    }
                                    guildData.push(player);
                                }
                            }
                        }

                        if (guildData.length > 0) {
                            const saveGuildName = currentGuild || `帮会${guildIndex || 1}`;
                            result[saveGuildName] = guildData;
                        }

                        resolve(result);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.onerror = reject;
                reader.readAsText(file);
            });
        }

        // 计算联赛数据
        function calculateLeagueData(battleData) {
            const leagueData = {};
            Object.keys(battleData).forEach(guildName => {
                const players = battleData[guildName];
                const totals = {
                    defeat: players.reduce((sum, p) => sum + (p['击败'] || 0), 0),
                    assist: players.reduce((sum, p) => sum + (p['助攻'] || 0), 0),
                    playerDamage: players.reduce((sum, p) => sum + (p['对玩家伤害'] || 0), 0),
                    buildingDamage: players.reduce((sum, p) => sum + (p['对建筑伤害'] || 0), 0),
                    healing: players.reduce((sum, p) => sum + (p['治疗值'] || 0), 0),
                    takenDamage: players.reduce((sum, p) => sum + (p['承受伤害'] || 0), 0),
                    deaths: 0
                };

                const enrichedPlayers = players.map(player => {
                    const deaths = Math.floor((player['承受伤害'] || 0) / 5000) || 0;
                    totals.deaths += deaths;
                    
                    return {
                        ...player,
                        '死亡次数': deaths,
                        'KDA': deaths > 0 ? ((player['击败'] + player['助攻']) / deaths).toFixed(2) : (player['击败'] + player['助攻']).toFixed(2),
                        '击败占比': totals.defeat > 0 ? ((player['击败'] / totals.defeat) * 100).toFixed(2) + '%' : '0%',
                        '人伤占比': totals.playerDamage > 0 ? ((player['对玩家伤害'] / totals.playerDamage) * 100).toFixed(2) + '%' : '0%',
                        '治疗占比': totals.healing > 0 ? ((player['治疗值'] / totals.healing) * 100).toFixed(2) + '%' : '0%'
                    };
                });

                leagueData[guildName] = enrichedPlayers;
            });
            return leagueData;
        }

        // 显示状态
        function showStatus(message) {
            statusText.textContent = message;
            statusIndicator.classList.remove('hidden');
        }

        // 隐藏状态
        function hideStatus() {
            statusIndicator.classList.add('hidden');
        }

        // 清除数据（兼容旧函数）
        function clearData() {
            clearAllBattleData();
        }
    </script>
