<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逆水寒 · 战斗分析系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        :root {
            --ink-black: #0d0d0d;
            --ink-dark: #1a1a1a;
            --ink-gray: #2a2a2a;
            --jade: #00d4aa;
            --jade-dim: #00d4aa40;
            --gold: #c9a227;
            --gold-dim: #c9a22730;
            --crimson: #8b2635;
            --cyan: #00b4d8;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--ink-black);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            color: #e0e0e0;
        }
        
        /* 水墨背景 */
        .ink-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 180, 216, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 212, 170, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 40%, rgba(201, 162, 39, 0.04) 0%, transparent 40%);
        }
        
        /* 网格线 */
        .tech-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 212, 170, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 170, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        /* 装饰角纹 */
        .corner-decoration {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 1px solid var(--jade-dim);
        }
        .corner-decoration.top-left {
            top: -1px; left: -1px;
            border-right: none; border-bottom: none;
        }
        .corner-decoration.top-right {
            top: -1px; right: -1px;
            border-left: none; border-bottom: none;
        }
        .corner-decoration.bottom-left {
            bottom: -1px; left: -1px;
            border-right: none; border-top: none;
        }
        .corner-decoration.bottom-right {
            bottom: -1px; right: -1px;
            border-left: none; border-top: none;
        }
        
        /* 主标题 */
        .main-title {
            font-family: 'Noto Serif SC', serif;
            font-weight: 700;
            letter-spacing: 0.3em;
            background: linear-gradient(180deg, #f5f5f5 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 212, 170, 0.3);
        }
        
        .subtitle {
            font-family: 'Noto Serif SC', serif;
            font-weight: 400;
            letter-spacing: 0.2em;
            color: #888;
        }
        
        /* 分隔线 */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--jade);
            opacity: 0.6;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--jade-dim), transparent);
        }
        
        /* 系统卡片 */
        .system-card {
            background: linear-gradient(145deg, rgba(26, 26, 26, 0.9) 0%, rgba(13, 13, 13, 0.95) 100%);
            border: 1px solid var(--ink-gray);
            position: relative;
            transition: all 0.4s ease;
            overflow: hidden;
        }
        
        .system-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(0, 212, 170, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .system-card:hover {
            border-color: var(--jade-dim);
            transform: translateY(-4px);
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(0, 212, 170, 0.1);
        }
        
        .system-card:hover::before {
            opacity: 1;
        }
        
        /* 卡片发光边框 */
        .card-glow {
            position: absolute;
            inset: -1px;
            background: linear-gradient(135deg, var(--jade-dim), transparent, var(--gold-dim));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }
        .system-card:hover .card-glow {
            opacity: 1;
        }
        
        /* 图标容器 */
        .icon-container {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--ink-gray);
            position: relative;
            transition: all 0.3s ease;
        }
        
        .system-card:hover .icon-container {
            border-color: var(--jade-dim);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.2);
        }
        
        .icon-container::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        
        .system-card:hover .icon-container::before {
            border-color: var(--jade-dim);
        }
        
        /* 按钮 */
        .action-btn {
            position: relative;
            background: transparent;
            border: 1px solid var(--ink-gray);
            color: #ccc;
            transition: all 0.3s ease;
            overflow: hidden;
            font-family: 'Noto Sans SC', sans-serif;
            letter-spacing: 0.1em;
        }
        
        .action-btn::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0;
            background: linear-gradient(180deg, transparent, rgba(0, 212, 170, 0.1));
            transition: height 0.3s ease;
        }
        
        .action-btn:hover {
            border-color: var(--jade);
            color: var(--jade);
        }
        
        .action-btn:hover::before {
            height: 100%;
        }
        
        /* 标签 */
        .tag {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border: 1px solid var(--ink-gray);
            color: #666;
            transition: all 0.3s ease;
        }
        
        .system-card:hover .tag {
            border-color: var(--jade-dim);
            color: var(--jade);
        }
        
        /* 页脚 */
        .footer-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--ink-gray), transparent);
        }
        
        /* 二维码悬停显示 - 从左侧弹出 */
        .qr-trigger-right {
            position: relative;
            cursor: pointer;
        }
        
        .qr-popup-right {
            position: absolute;
            right: 100%;
            top: 50%;
            transform: translateY(-50%) translateX(10px);
            margin-right: 16px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 1000;
            width: 250px;
        }
        
        .qr-trigger-right:hover .qr-popup-right {
            opacity: 1;
            visibility: visible;
            transform: translateY(-50%) translateX(0);
        }
        
        .qr-popup-right img {
            width: 250px;
            height: auto;
            display: block;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 4px solid var(--ink-gray);
            background: white;
            padding: 16px;
        }
        
        .qr-popup-right::after {
            content: '';
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            border: 8px solid transparent;
            border-left-color: var(--ink-gray);
        }
        
        /* 鸣谢头像 */
        .credit-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            object-fit: cover;
            vertical-align: middle;
            margin-left: 4px;
            border: 1px solid var(--ink-gray);
        }
        
        /* 扫描线效果 */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--jade-dim), transparent);
            opacity: 0.3;
            animation: scan 8s linear infinite;
            pointer-events: none;
            z-index: 100;
        }
        
        @keyframes scan {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 1.75rem;
                letter-spacing: 0.2em;
            }
        }
    </style>
</head>
<body class="p-6 md:p-12">
